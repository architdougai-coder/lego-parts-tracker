    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .color-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; border: 1px solid rgba(0,0,0,0.15); vertical-align: middle; }
        .sync-indicator { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 4px 10px; border-radius: 99px; transition: all 0.3s; }
        select optgroup { font-weight: bold; color: #475569; background: #f8fafc; }
        .part-image-preview { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 10px 10px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
    <script>
        /**
         * 圖片回退核心邏輯 (三層回退)
         */
        window.handleImageError = function(imgElement) {
            const currentSrc = imgElement.src;
            const partIdInput = document.getElementById('partId');
            const partId = partIdInput ? partIdInput.value.trim() : "";

            if (!partId) {
                showPlaceholder(imgElement);
                return;
            }

            // Fallback 1: 嘗試加載黑色 (BrickLink ID: 11) 基準圖
            if (!currentSrc.includes('/11/') && !currentSrc.includes('rebrickable')) {
                imgElement.src = `https://img.bricklink.com/ItemImage/PN/11/${partId}.png`;
            } 
            // Fallback 2: 嘗試 Rebrickable 的通用渲染圖 (Any Color)
            else if (currentSrc.includes('/11/')) {
                imgElement.src = `https://rebrickable.com/media/parts/elements/${partId}.jpg`;
            }
            // Fallback 3: 最終失敗，顯示佔位符
            else {
                showPlaceholder(imgElement);
            }
        };

        function showPlaceholder(imgElement) {
            imgElement.classList.add('hidden');
            const placeholder = document.getElementById('imagePlaceholder');
            if (placeholder) placeholder.classList.remove('hidden');
        }

        // 庫存清單內部圖片的錯誤處理
        window.handleListImageError = function(img, partId) {
            const currentSrc = img.src;
            if (!currentSrc.includes('/11/') && !currentSrc.includes('rebrickable')) {
                img.src = `https://img.bricklink.com/ItemImage/PN/11/${partId}.png`;
            } else if (currentSrc.includes('/11/')) {
                img.src = `https://rebrickable.com/media/parts/elements/${partId}.jpg`;
            } else {
                img.src = 'https://placehold.co/100x100?text=N/A';
            }
        };
    </script>

            { id: "67", name: "Metallic Silver", hex: "#A5A9B4", type: "Metallic" },
            { id: "65", name: "Metallic Gold", hex: "#DBAC34", type: "Metallic" }
        ];

        async function startApp() {
            try { await signInAnonymously(auth); } 
            catch (err) { console.error("Firebase Error:", err); }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                const statusEl = document.getElementById('cloudStatus');
                if (statusEl) statusEl.innerHTML = `<span class="h-2 w-2 rounded-full bg-green-500"></span> 雲端連線成功`;
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), (snap) => {
                    parts = snap.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
                    window.renderInventory();
                });
            }
        });

        window.handleIdInput = (val) => {
            if (val.trim().length >= 2) updatePreviewImage();
        };

        window.handleColorChange = () => {
            const select = document.getElementById('partColor');
            const dot = document.getElementById('selectedColorDot');
            if (select && dot) dot.style.backgroundColor = select.options[select.selectedIndex].dataset.hex;
            updatePreviewImage();
        };

        function updatePreviewImage() {
            const id = document.getElementById('partId').value.trim();
            const colorSelect = document.getElementById('partColor');
            const img = document.getElementById('imagePreview');
            const placeholder = document.getElementById('imagePlaceholder');
            
            if (!id || !img || !colorSelect) return;
            
            // 讀取隱藏的 BrickLink ID (dataset.blId) 來精準抓取圖片
            const blId = colorSelect.options[colorSelect.selectedIndex].dataset.blId;
            
            img.classList.remove('hidden');
            if (placeholder) placeholder.classList.add('hidden');
            img.src = `https://img.bricklink.com/ItemImage/PN/${blId}/${id}.png`;
        }

        window.addPart = async () => {
            const id = document.getElementById('partId').value.trim();
            const colorSelect = document.getElementById('partColor');
            const qtyInput = document.getElementById('partQty');
            const qty = qtyInput ? parseInt(qtyInput.value) : 1;
            if (!id || !currentUser) return showToast("請檢查輸入內容");
            
            const docKey = `${id}_${colorSelect.value}`;
            const existing = parts.find(p => p.docId === docKey);
            
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', docKey), {
                id, category: document.getElementById('partCategory').value,
                colorId: colorSelect.value, // 儲存 Rebrickable ID
                blId: colorSelect.options[colorSelect.selectedIndex].dataset.blId, // 同時儲存 BrickLink ID 供渲染用
                colorName: colorSelect.options[colorSelect.selectedIndex].text,
                colorHex: colorSelect.options[colorSelect.selectedIndex].dataset.hex,
                qty: existing ? existing.qty + qty : qty,
                updatedAt: Date.now()
            });
            document.getElementById('partId').value = '';
            showToast(`已成功記錄 #${id}`);
        };

        window.updateQty = async (docId, delta) => {
            const part = parts.find(p => p.docId === docId);
            const newQty = part.qty + delta;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'inventory', docId);
            if (newQty <= 0) { if(confirm('確定移除此項目？')) await deleteDoc(ref); }
            else await setDoc(ref, { ...part, qty: newQty }, { merge: true });
        };

        window.deletePart = async (id) => { if(confirm('確認刪除紀錄？')) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', id)); };

        window.renderInventory = () => {
            const container = document.getElementById('inventoryContainer');
            const sortFieldEl = document.getElementById('sortField');
            const sortOrderEl = document.getElementById('sortOrder');
            if (!container || !sortFieldEl || !sortOrderEl) return;

            const field = sortFieldEl.value;
            const order = sortOrderEl.value;
            container.innerHTML = '';
            
            if (!parts.length) { document.getElementById('emptyState').classList.remove('hidden'); return; }
            document.getElementById('emptyState').classList.add('hidden');

            let sorted = [...parts].sort((a,b) => order === 'asc' ? (a[field] > b[field] ? 1 : -1) : (a[field] < b[field] ? 1 : -1));
            const grouped = sorted.reduce((acc, p) => { (acc[p.category] = acc[p.category] || []).push(p); return acc; }, {});

            Object.keys(grouped).forEach(cat => {
                const section = document.createElement('div');
                section.className = "bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-6";
                section.innerHTML = `
                    <div class="bg-slate-700 text-white px-6 py-2 text-xs font-bold uppercase tracking-wider">${cat}</div>
                    <table class="w-full">
                        <tbody class="divide-y divide-gray-100">
                            ${grouped[cat].map(p => `
                                <tr class="hover:bg-slate-50 transition-colors">
                                    <td class="p-3 w-20">
                                        <img src="https://img.bricklink.com/ItemImage/PN/${p.blId || 11}/${p.id}.png" 
                                             class="w-12 h-12 object-contain mx-auto" 
                                             onerror="window.handleListImageError(this, '${p.id}')">
                                    </td>
                                    <td class="p-3">
                                        <div class="font-bold text-slate-800">#${p.id}</div>
                                        <div class="flex items-center gap-1"><span class="color-dot" style="background-color:${p.colorHex}"></span><span class="text-[10px] text-gray-500 font-medium">${p.colorName}</span></div>
                                    </td>
                                    <td class="p-3 text-center">
                                        <div class="inline-flex items-center gap-2 bg-gray-100 p-1 rounded-lg">
                                            <button onclick="window.updateQty('${p.docId}', -1)" class="w-7 h-7 bg-white rounded shadow-sm text-gray-400 hover:text-red-500">-</button>
                                            <span class="font-bold w-6 text-slate-700">${p.qty}</span>
                                            <button onclick="window.updateQty('${p.docId}', 1)" class="w-7 h-7 bg-white rounded shadow-sm text-gray-400 hover:text-green-500">+</button>
                                        </div>
                                    </td>
                                    <td class="p-3 text-right">
                                        <button onclick="window.deletePart('${p.docId}')" class="text-gray-300 hover:text-red-500 px-2 transition-colors">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`;
                container.appendChild(section);
            });
            document.getElementById('stats').innerHTML = `共計: <strong>${parts.length}</strong> 款 / <strong>${parts.reduce((s,p)=>s+p.qty,0)}</strong> 塊`;
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            const m = document.getElementById('toastMsg');
            if (!t || !m) return;
            m.innerText = msg;
            t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 1rem)'; }, 2000);
        }

        window.exportToCSV = () => {
            if (!parts.length) return;
            // 匯出時統一使用 Rebrickable 標準
            let csv = "data:text/csv;charset=utf-8,\uFEFF分類,零件編號,Rebrickable_顏色ID,顏色名稱,數量\n";
            parts.forEach(p => csv += `${p.category},#${p.id},${p.colorId},${p.colorName},${p.qty}\n`);
            const link = document.createElement("a");
            link.href = encodeURI(csv);
            link.download = `Lego_Inventory_RB_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        };

        // 初始化顏色選單並寫入 bl_id (BrickLink ID) 作為 data 屬性
        const colorSelect = document.getElementById('partColor');
        if (colorSelect) {
            const types = ["Solid", "Trans", "Pearl", "Chrome", "Metallic"];
            types.forEach(t => {
                const g = document.createElement('optgroup'); g.label = t.toUpperCase();
                rebrickableColors.filter(c => c.type === t).forEach(c => {
                    const o = document.createElement('option'); 
                    o.value = c.id; 
                    o.textContent = `[${c.id}] ${c.name}`; 
                    o.dataset.hex = c.hex;
                    o.dataset.blId = c.bl_id; // 綁定 BrickLink ID
                    if(c.id === "0") o.selected = true; // 預設黑色
                    g.appendChild(o);
                });
                colorSelect.appendChild(g);
            });
        }

        window.handleColorChange();
        startApp();
    </script>
</body>
</html>
