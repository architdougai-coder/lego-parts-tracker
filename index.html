<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lego Spare Parts 智能管理系統 (Brick Architect 分類版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        /**
         * 錯誤修復：將全域圖片處理函式移至 head 最上方
         * 確保 HTML 渲染時，onerror 屬性能正確找到對應的 function
         */
        window.handleImageError = function(imgElement) {
            const id = document.getElementById('partId') ? document.getElementById('partId').value.trim() : "";
            if (!id) return;
            const currentSrc = imgElement.src;
            // 如果當前不是使用 BrickLink PN 格式，則嘗試切換
            if (!currentSrc.includes('PN/11/')) {
                imgElement.src = `https://img.bricklink.com/ItemImage/PN/11/${id}.png`;
            } else {
                imgElement.classList.add('hidden');
                const placeholder = document.getElementById('imagePlaceholder');
                if (placeholder) placeholder.classList.remove('hidden');
            }
        };

        window.handleListImageError = function(img, partId) {
            if (!img.src.includes('PN/11/')) {
                img.src = `https://img.bricklink.com/ItemImage/PN/11/${partId}.png`;
            } else {
                img.src = 'https://placehold.co/100x100?text=N/A';
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .color-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; border: 1px solid rgba(0,0,0,0.15); vertical-align: middle; }
        .sync-indicator { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 4px 10px; border-radius: 99px; transition: all 0.3s; }
        select optgroup { font-weight: bold; color: #475569; background: #f8fafc; }
        .part-image-preview { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 10px 10px; }
        .ai-card { background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%); border: 1px solid #dbeafe; }
        .auto-tag { font-size: 10px; background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 4px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="text-red-600">LEGO</span> 智能零件庫
                </h1>
                <div class="flex flex-wrap items-center gap-3 mt-2">
                    <div id="cloudStatus" class="sync-indicator bg-gray-200 text-gray-600 font-bold tracking-wide">雲端連線中...</div>
                    <button onclick="window.exportToCSV()" class="sync-indicator bg-blue-50 text-blue-600 hover:bg-blue-100 border border-blue-200 cursor-pointer shadow-sm">下載 CSV 備份</button>
                    <button id="aiAdviceBtn" onclick="window.getAIAdvice()" class="sync-indicator bg-purple-50 text-purple-600 hover:bg-purple-100 border border-purple-200 cursor-pointer shadow-sm font-bold">✨ AI 創意靈感</button>
                </div>
            </div>
            <div id="stats" class="text-sm font-medium bg-white px-5 py-2.5 rounded-full shadow-sm border border-gray-100 text-blue-600">載入中...</div>
        </header>

        <div id="aiContainer" class="hidden mb-8 p-6 ai-card rounded-2xl shadow-sm border animate-fade-in">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-lg font-bold text-purple-700 flex items-center gap-2">✨ Gemini AI 拼砌建議</h3>
                <button onclick="document.getElementById('aiContainer').classList.add('hidden')" class="text-gray-400 hover:text-gray-600">✕</button>
            </div>
            <div id="aiContent" class="text-slate-700 leading-relaxed text-sm whitespace-pre-wrap">分析中...</div>
        </div>

        <div class="bg-white rounded-2xl shadow-md p-6 mb-8 border border-gray-100">
            <div class="flex flex-col md:flex-row gap-6">
                <div class="w-full md:w-32 h-32 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 flex items-center justify-center overflow-hidden part-image-preview relative">
                    <img id="imagePreview" src="" alt="預覽" class="max-w-full max-h-full object-contain hidden z-10" onerror="window.handleImageError(this)">
                    <div id="imagePlaceholder" class="text-gray-400 text-xs text-center p-2 z-0">輸入編號<br>顯示圖片</div>
                </div>

                <div class="flex-1 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="relative">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1 flex justify-between">
                            零件編號 # <span id="autoClassifying" class="hidden text-blue-500 animate-pulse text-[10px]">自動分類中...</span>
                        </label>
                        <input type="text" id="partId" oninput="window.handleIdInput(this.value)" placeholder="例如: 3001" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all font-mono text-lg">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">
                            PDF 分類 <span id="isAutoTag" class="hidden auto-tag">AUTO</span>
                        </label>
                        <select id="partCategory" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-slate-700 text-sm">
                            <option value="BRICKS">1. BRICKS (基本磚)</option>
                            <option value="PLATES">2. PLATES (薄板)</option>
                            <option value="TILES">3. TILES (平滑板)</option>
                            <option value="SLOPES">4. SLOPES (斜面磚)</option>
                            <option value="ROUND">5. ROUND (圓形零件)</option>
                            <option value="MODIFIED">6. MODIFIED (特殊變體磚)</option>
                            <option value="TECHNIC">7. TECHNIC (科技系列)</option>
                            <option value="CONNECTORS">8. CONNECTORS (連接件)</option>
                            <option value="WHEELS">9. WHEELS & TIRES (輪胎)</option>
                            <option value="WINDOWS">10. WINDOWS & DOORS (窗門)</option>
                            <option value="WEDGE">11. WEDGE (楔形磚)</option>
                            <option value="ARCHES">12. ARCHES (拱形)</option>
                            <option value="BRACKETS">13. BRACKETS (托架)</option>
                            <option value="PLANTS">14. PLANTS (植物)</option>
                            <option value="ANIMAL">15. ANIMAL (動物/生物)</option>
                            <option value="MINIFIG">16. MINIFIG (人仔配件)</option>
                            <option value="OTHER">20. OTHER (其他)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1 flex items-center gap-1">
                            顏色 <span id="selectedColorDot" class="color-dot ml-1"></span>
                        </label>
                        <select id="partColor" onchange="window.handleColorChange()" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-xs"></select>
                    </div>
                    <div class="flex gap-2 items-end">
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">數量</label>
                            <input type="number" id="partQty" value="1" min="1" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                        </div>
                        <button onclick="window.addPart()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-lg transition shadow-lg h-[46px]">加入</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="inventoryContainer" class="space-y-6"></div>
        <div id="emptyState" class="hidden py-20 text-center bg-white rounded-2xl border border-gray-100"><p class="text-gray-400 font-medium">庫存清單為空</p></div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white font-medium px-8 py-3 rounded-full text-sm opacity-0 transition-all duration-300 pointer-events-none shadow-2xl z-50">
        <span id="toastMsg">更新成功</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHjaos0ygWdAFfBlqKVCfPhCKXxxedRQQ",
            authDomain: "lego-de0f1.firebaseapp.com",
            projectId: "lego-de0f1",
            storageBucket: "lego-de0f1.firebasestorage.app",
            messagingSenderId: "222666505877",
            appId: "1:222666505877:web:553437bb1f03fc7460259c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "lego-master-vault";
        const apiKey = ""; 

        let currentUser = null;
        let parts = [];
        let autoClassifyTimer = null;

        const brickLinkActiveColors = [
            { id: "1", name: "White", hex: "#FFFFFF", type: "Solid" },
            { id: "86", name: "Light Bluish Gray", hex: "#A0A5A9", type: "Solid" },
            { id: "85", name: "Dark Bluish Gray", hex: "#6C6E68", type: "Solid" },
            { id: "11", name: "Black", hex: "#212121", type: "Solid" },
            { id: "59", name: "Dark Red", hex: "#720E0F", type: "Solid" },
            { id: "5", name: "Red", hex: "#B40000", type: "Solid" },
            { id: "167", name: "Reddish Orange", hex: "#FF5500", type: "Solid" },
            { id: "220", name: "Coral", hex: "#FF6D77", type: "Solid" },
            { id: "120", name: "Dark Brown", hex: "#352100", type: "Solid" },
            { id: "88", name: "Reddish Brown", hex: "#582A12", type: "Solid" },
            { id: "69", name: "Dark Tan", hex: "#958A73", type: "Solid" },
            { id: "2", name: "Tan", hex: "#E4CD9E", type: "Solid" },
            { id: "90", name: "Light Nougat", hex: "#F6D7B3", type: "Solid" },
            { id: "28", name: "Nougat", hex: "#FFAF7B", type: "Solid" },
            { id: "4", name: "Orange", hex: "#FE8A18", type: "Solid" },
            { id: "3", name: "Yellow", hex: "#F2CD37", type: "Solid" },
            { id: "34", name: "Lime", hex: "#BBE90B", type: "Solid" },
            { id: "80", name: "Dark Green", hex: "#184632", type: "Solid" },
            { id: "6", name: "Green", hex: "#237841", type: "Solid" },
            { id: "63", name: "Dark Blue", hex: "#0A3463", type: "Solid" },
            { id: "7", name: "Blue", hex: "#0055BF", type: "Solid" },
            { id: "89", name: "Dark Purple", hex: "#3F3691", type: "Solid" },
            { id: "12", name: "Trans-Clear", hex: "#FCFCFC", type: "Transparent" },
            { id: "17", name: "Trans-Red", hex: "#C91A09", type: "Transparent" },
            { id: "14", name: "Trans-Dark Blue", hex: "#0020A0", type: "Transparent" },
            { id: "95", name: "Flat Silver", hex: "#898788", type: "Pearl" },
            { id: "115", name: "Pearl Gold", hex: "#AA7F2E", type: "Pearl" },
            { id: "67", name: "Metallic Silver", hex: "#A5A9B4", type: "Metallic" },
            { id: "65", name: "Metallic Gold", hex: "#DBAC34", type: "Metallic" }
        ];

        async function init() {
            const colorSelect = document.getElementById('partColor');
            if (!colorSelect) return;
            const types = ["Solid", "Transparent", "Pearl", "Metallic"];
            types.forEach(t => {
                const g = document.createElement('optgroup'); g.label = t.toUpperCase();
                brickLinkActiveColors.filter(c => c.type === t).forEach(c => {
                    const o = document.createElement('option'); 
                    o.value = c.id; o.textContent = `[${c.id}] ${c.name}`; 
                    o.dataset.hex = c.hex;
                    if(c.id === "11") o.selected = true;
                    g.appendChild(o);
                });
                colorSelect.appendChild(g);
            });
            window.handleColorChange();
            await signInAnonymously(auth);
        }

        window.handleIdInput = (val) => {
            document.getElementById('isAutoTag').classList.add('hidden');
            if (val.trim().length >= 2) updatePreviewImage();
            clearTimeout(autoClassifyTimer);
            if (val.trim().length >= 3) {
                autoClassifyTimer = setTimeout(() => window.autoClassify(val.trim()), 800);
            }
        };

        window.autoClassify = async (partId) => {
            const statusLabel = document.getElementById('autoClassifying');
            const categorySelect = document.getElementById('partCategory');
            statusLabel.classList.remove('hidden');
            try {
                const prompt = `Lego Part #${partId}. Classify strictly into one: BRICKS, PLATES, TILES, SLOPES, ROUND, MODIFIED, TECHNIC, CONNECTORS, WHEELS, WINDOWS, WEDGE, ARCHES, BRACKETS, PLANTS, ANIMAL, MINIFIG, OTHER. Output ONLY the word.`;
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                let result = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim().toUpperCase();
                result = result.replace(/[^A-Z]/g, ''); 
                
                if (result && Array.from(categorySelect.options).some(o => o.value === result)) {
                    categorySelect.value = result;
                    document.getElementById('isAutoTag').classList.remove('hidden');
                }
            } catch (e) { console.error("Auto Classify Error:", e); }
            statusLabel.classList.add('hidden');
        };

        window.handleColorChange = () => {
            const select = document.getElementById('partColor');
            const dot = document.getElementById('selectedColorDot');
            if (select?.options[select.selectedIndex]) dot.style.backgroundColor = select.options[select.selectedIndex].dataset.hex;
            updatePreviewImage();
        };

        function updatePreviewImage() {
            const id = document.getElementById('partId').value.trim();
            const colorSelect = document.getElementById('partColor');
            const img = document.getElementById('imagePreview');
            if (!id || !colorSelect.options[colorSelect.selectedIndex]) return;
            img.classList.remove('hidden');
            const placeholder = document.getElementById('imagePlaceholder');
            if (placeholder) placeholder.classList.add('hidden');
            img.src = `https://img.bricklink.com/ItemImage/PN/${colorSelect.value}/${id}.png`;
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('cloudStatus').innerHTML = `<span class="h-2 w-2 rounded-full bg-green-500"></span> Online`;
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), (snap) => {
                    parts = snap.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
                    window.renderInventory();
                });
            }
        });

        window.addPart = async () => {
            const id = document.getElementById('partId').value.trim();
            const colorSelect = document.getElementById('partColor');
            if (!id || !currentUser) return;
            const opt = colorSelect.options[colorSelect.selectedIndex];
            const key = `${id}_${colorSelect.value}`;
            const existing = parts.find(p => p.docId === key);
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', key), {
                id, category: document.getElementById('partCategory').value,
                colorId: colorSelect.value, 
                colorName: opt.text.replace(/\[\d+\] /, ''), colorHex: opt.dataset.hex,
                qty: existing ? existing.qty + 1 : 1
            });
            showToast(`已加入 #${id}`);
        };

        window.renderInventory = () => {
            const container = document.getElementById('inventoryContainer');
            container.innerHTML = '';
            if (!parts.length) { document.getElementById('emptyState').classList.remove('hidden'); return; }
            document.getElementById('emptyState').classList.add('hidden');
            const grouped = parts.reduce((acc, p) => { (acc[p.category] = acc[p.category] || []).push(p); return acc; }, {});
            Object.keys(grouped).sort().forEach(cat => {
                const section = document.createElement('div');
                section.className = "bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-6 animate-fade-in";
                section.innerHTML = `
                    <div class="bg-slate-700 text-white px-6 py-2 text-xs font-bold uppercase tracking-wider">${cat}</div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <tbody class="divide-y divide-gray-100">
                                ${grouped[cat].map(p => `
                                    <tr class="hover:bg-gray-50 transition">
                                        <td class="p-3 w-16 text-center"><img src="https://img.bricklink.com/ItemImage/PN/${p.colorId}/${p.id}.png" class="w-10 h-10 object-contain mx-auto" onerror="window.handleListImageError(this, '${p.id}')"></td>
                                        <td class="p-3 font-mono font-bold text-gray-700">#${p.id}</td>
                                        <td class="p-3 text-gray-600"><span class="color-dot mr-2" style="background-color:${p.colorHex}"></span>${p.colorName}</td>
                                        <td class="p-3 text-center font-bold text-blue-600">x${p.qty}</td>
                                        <td class="p-3 text-right"><button onclick="window.deletePart('${p.docId}')" class="text-gray-300 hover:text-red-500 transition px-2 text-lg">✕</button></td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>`;
                container.appendChild(section);
            });
            document.getElementById('stats').innerText = `共 ${parts.length} 款零件`;
        };

        window.deletePart = async (id) => await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', id));

        window.getAIAdvice = async () => {
            const aiContainer = document.getElementById('aiContainer');
            const aiContent = document.getElementById('aiContent');
            if (!parts.length) return;
            aiContainer.classList.remove('hidden');
            aiContent.innerText = "正在分析您的庫存... ✨";
            const summary = parts.map(p => `${p.qty}x ${p.colorName} ${p.id}`).join(', ');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `我目前有這些 LEGO 零件: ${summary}。請給我 3 個具體的拼砌靈感（繁體中文）。` }] }] })
                });
                const data = await res.json();
                aiContent.innerText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) { aiContent.innerText = "AI 連線失敗。"; }
        };

        window.exportToCSV = () => {
            let csv = "data:text/csv;charset=utf-8,\uFEFF分類,零件編號,顏色,數量\n";
            parts.forEach(p => csv += `${p.category},#${p.id},${p.colorName},${p.qty}\n`);
            const link = document.createElement("a");
            link.href = encodeURI(csv);
            link.download = `Lego_Inventory_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.style.opacity = '1'; t.style.transform = 'translate(-50%, -10px)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 0)'; }, 2000);
        }

        init();
    </script>
</body>
</html>
