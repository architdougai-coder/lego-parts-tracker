<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧱 LEGO Spare Parts Tracker</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --card2: #242424;
      --accent: #e0e0e0;
      --accent-hover: #ffffff;
      --text: #f0f0f0;
      --muted: #888888;
      --border: #2e2e2e;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--card);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #444444;
      position: sticky; top: 0; z-index: 100;
    }
    header h1 { font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
    .sync-badge {
      font-size: 0.72rem; padding: 3px 10px;
      border-radius: 20px; background: #1f1f1f;
      color: #aaaaaa; border: 1px solid #555555;
      display: flex; align-items: center; gap: 5px;
    }
    .sync-badge.syncing { background: #2a2a2a; color: #dddddd; border-color: #888888; }
    .sync-badge.offline { background: #222222; color: #888888; border-color: #555555; }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

    /* === ADD FORM === */
    .add-form-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }
    .add-form-card h2 { font-size: 1rem; color: var(--muted); margin-bottom: 16px; letter-spacing: 1px; text-transform: uppercase; }
    .form-row {
      display: grid;
      grid-template-columns: 140px 1fr 220px 100px auto;
      gap: 12px;
      align-items: start;
    }
    @media (max-width: 768px) {
      .form-row { grid-template-columns: 1fr 1fr; }
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 0.95rem;
      width: 100%;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { outline: none; border-color: #777777; }
    input::placeholder { color: var(--muted); }

    .preview-zone {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 80px; height: 80px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .preview-zone img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .preview-zone .placeholder { color: var(--muted); font-size: 0.7rem; text-align: center; padding: 4px; }

    .color-option { display: flex; align-items: center; gap: 8px; }
    .color-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }
    #colorSelect { padding-left: 8px; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s, background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.95; }
    .btn:active { transform: scale(0.97); }
    .btn-add {
      background: #2e2e2e;
      color: #f0f0f0;
      border: 1px solid #555555;
      margin-top: 20px; width: 100%;
    }
    .btn-add:hover { background: #ffffff; color: #000000; }
    .btn-export {
      background: #222222;
      color: #cccccc;
      border: 1px solid #444444;
    }
    .btn-export:hover { background: #ffffff; color: #000000; }

    .color-preview-strip {
      display: flex; align-items: center; gap: 10px;
      background: #111111; border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; margin-top: 4px;
    }
    .color-preview-strip .big-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); }
    .color-preview-strip span { font-size: 0.85rem; color: var(--text); }

    /* === FILTERS === */
    .filters {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 20px; align-items: center;
    }
    .filters input { max-width: 200px; }
    .filters select { max-width: 180px; }
    .count-badge {
      margin-left: auto;
      background: #1e1e1e;
      border-radius: 20px;
      padding: 4px 14px; font-size: 0.82rem; color: #777777;
    }

    /* === TABLE === */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #1e1e1e;
      padding: 12px 16px;
      text-align: left;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: #f0f0f0; }
    thead th .sort-icon { opacity: 0.4; margin-left: 4px; }
    thead th.sorted .sort-icon { opacity: 1; color: #ffffff; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    td { padding: 12px 16px; vertical-align: middle; font-size: 0.92rem; }

    .part-img { width: 52px; height: 52px; object-fit: contain; background: #fff1; border-radius: 6px; padding: 2px; }
    .part-num { font-family: monospace; font-weight: 700; font-size: 1rem; color: #e8e8e8; }
    .part-name { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    .color-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 20px; padding: 3px 10px;
      font-size: 0.82rem;
    }
    .color-chip .dot { width: 11px; height: 11px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }

    .qty-control { display: flex; align-items: center; gap: 8px; }
    .qty-btn {
      width: 28px; height: 28px;
      border-radius: 50%; border: 1px solid #3a3a3a;
      background: #2a2a2a;
      color: var(--text);
      cursor: pointer;
      font-size: 1rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .qty-btn:hover { background: #ffffff; color: #000000; border-color: #ffffff; }
    .qty-value { min-width: 28px; text-align: center; font-weight: 700; font-size: 1rem; }

    .cat-badge {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: #bbbbbb;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.78rem;
    }

    .btn-del {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      color: #999999;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s, color 0.15s;
    }
    .btn-del:hover { background: #444444; color: #ffffff; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }

    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #333333; color: #f0f0f0;
      padding: 12px 20px; border-radius: 10px;
      font-size: 0.88rem; z-index: 9999;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
    .img-thumb { cursor: zoom-in; }

    #autoCategory { font-size:0.78rem; color:#aaaaaa; margin-top:2px; }
  </style>
</head>
<body>

<header>
  <h1>🧱 LEGO Spare Parts Tracker</h1>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="btn btn-export" onclick="exportCSV()">⬇ 匯出 CSV</button>
    <span id="syncBadge" class="sync-badge">● 連線中…</span>
  </div>
</header>

<div class="container">

  <!-- ADD FORM -->
  <div class="add-form-card">
    <h2>➕ 新增零件</h2>
    <div class="form-row">

      <div class="form-group" style="grid-row:span 2;align-items:center">
        <label>預覽</label>
        <div class="preview-zone" id="previewZone">
          <div class="placeholder">輸入編號<br>睇預覽</div>
        </div>
      </div>

      <div class="form-group">
        <label>零件編號 *</label>
        <input id="inputNum" type="text" placeholder="e.g. 3001, 32523" oninput="onPartNumInput(this.value)" />
        <span id="autoCategory"></span>
      </div>

      <div class="form-group">
        <label>顏色 *</label>
        <select id="colorSelect" onchange="onColorChange()"></select>
        <div class="color-preview-strip" id="colorStrip">
          <div class="big-dot" id="bigDot"></div>
          <span id="colorName">—</span>
        </div>
      </div>

      <div class="form-group">
        <label>數量 *</label>
        <input id="inputQty" type="number" min="1" value="1" placeholder="1" />
      </div>

      <div></div>

      <div class="form-group" style="grid-column:2/4">
        <label>零件名稱（可選）</label>
        <input id="inputName" type="text" placeholder="e.g. Brick 2x4" />
      </div>

      <div class="form-group">
        <label>分類</label>
        <select id="catSelect">
          <option value="">自動偵測</option>
          <option>Brick</option>
          <option>Plate</option>
          <option>Tile</option>
          <option>Slope</option>
          <option>Technic</option>
          <option>Minifig</option>
          <option>Window / Door</option>
          <option>Arch / Curve</option>
          <option>Connector / Pin</option>
          <option>Gear / Axle</option>
          <option>Wedge</option>
          <option>Bracket</option>
          <option>Animal / Plant</option>
          <option>Sticker</option>
          <option>Other</option>
        </select>
      </div>

    </div>
    <button class="btn btn-add" onclick="addPart()">＋ 加入清單</button>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <input type="text" id="searchInput" placeholder="🔍 搜尋編號 / 名稱…" oninput="renderTable()" style="max-width:220px"/>
    <select id="filterColor" onchange="renderTable()">
      <option value="">所有顏色</option>
    </select>
    <select id="filterCat" onchange="renderTable()">
      <option value="">所有分類</option>
      <option>Brick</option><option>Plate</option><option>Tile</option>
      <option>Slope</option><option>Technic</option><option>Minifig</option>
      <option>Window / Door</option><option>Arch / Curve</option>
      <option>Connector / Pin</option><option>Gear / Axle</option>
      <option>Wedge</option><option>Bracket</option>
      <option>Animal / Plant</option><option>Sticker</option><option>Other</option>
    </select>
    <span class="count-badge" id="countBadge">0 項零件</span>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table id="partsTable">
      <thead>
        <tr>
          <th>圖片</th>
          <th onclick="sortBy('num')" id="thNum">編號 <span class="sort-icon">↕</span></th>
          <th>名稱</th>
          <th onclick="sortBy('color')" id="thColor">顏色 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('cat')" id="thCat">分類 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('qty')" id="thQty">數量 <span class="sort-icon">↕</span></th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="emoji">📦</div>
      <div>尚未有零件記錄，快啲加入第一件！</div>
    </div>
  </div>

</div>

<div id="toast"></div>

    document.getElementById("syncBadge").className = "sync-badge offline";

function autoDetectCategory(num) {
  const n = parseInt(num);
  if (isNaN(n)) return "";
  if ([2780,3673,6558,6562,32556,32054,43093,4459].includes(n)) return "Connector / Pin";
  if (num.startsWith("x") || num.startsWith("X")) return "Technic";
  if ([3023,3024,3710,3832,3460,4477,60479,11212].includes(n) ||
      (n>=3020 && n<=3030) || (n>=3816 && n<=3835)) return "Plate";
  if ([3068,3069,2431,6636,87079,63864].includes(n)) return "Tile";
  if ([3037,3038,3039,3040,3044,3045,3046,4286,60481].includes(n) ||
      (n>=30363 && n<=30382)) return "Slope";
  if ((n>=3626 && n<=3843) || [973,982,983,984].includes(n)) return "Minifig";
  if ([3855,3856,3857,3960,60596,60603].includes(n)) return "Window / Door";
  if ((n>=3700 && n<=3713) || (n>=32000 && n<=32316) || (n>=42000 && n<=42100)) return "Technic";
  if ([3001,3002,3003,3004,3005,3006,3007,3008,3009,3010,3011,3012,3013,3014,
       2357,6091,4733,30414].includes(n)) return "Brick";
  if (n>=3001 && n<=3016) return "Brick";
  return "Other";
}

function blImgUrl(partNum, colorId) {

function blImgFallback(partNum) {

function initColorSelect(selectId) {
  const sel = document.getElementById(selectId);
  sel.innerHTML = "";
  let lastType = "";
  brickLinkActiveColors.forEach(c => {
    if (c.type !== lastType) {
      const og = document.createElement("optgroup");
      og.label = `— ${c.type} —`;
      sel.appendChild(og);
      lastType = c.type;
    }
    const opt = document.createElement("option");
    opt.value = c.id;
    opt.textContent = c.name;
    opt.dataset.hex = c.hex;
    opt.dataset.name = c.name;
    sel.appendChild(opt);
  });
  const fsel = document.getElementById("filterColor");
  brickLinkActiveColors.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.id;
    opt.textContent = c.name;
    fsel.appendChild(opt);
  });
}

function onColorChange() {
  const sel = document.getElementById("colorSelect");
  const opt = sel.options[sel.selectedIndex];
  if (!opt) return;
  const hex = opt.dataset.hex || "#888";
  const name = opt.dataset.name || "";
  document.getElementById("bigDot").style.background = hex;
  document.getElementById("bigDot").style.borderColor = hex === "#FFFFFF" ? "#ccc" : hex;
  document.getElementById("colorName").textContent = name;
  const num = document.getElementById("inputNum").value.trim();
  if (num) loadPreview(num, sel.value);
}

let previewTimer = null;
function onPartNumInput(val) {
  const trimmed = val.trim();
  document.getElementById("autoCategory").textContent = "";
  if (!trimmed) {
    document.getElementById("previewZone").innerHTML = '<div class="placeholder">輸入編號<br>睇預覽</div>';
    return;
  }
  const cat = autoDetectCategory(trimmed);
  if (cat) document.getElementById("autoCategory").textContent = `自動分類: ${cat}`;
  clearTimeout(previewTimer);
  previewTimer = setTimeout(() => {
    const colorId = document.getElementById("colorSelect").value;
    loadPreview(trimmed, colorId);
  }, 400);
}

function loadPreview(partNum, colorId) {
  const zone = document.getElementById("previewZone");
  const img = new Image();
  img.style.cssText = "max-width:76px;max-height:76px;object-fit:contain";
  img.src = blImgUrl(partNum, colorId);
  img.onload = () => { zone.innerHTML = ""; zone.appendChild(img); };
  img.onerror = () => {
    const fb = new Image();
    fb.style.cssText = img.style.cssText;
    fb.src = blImgFallback(partNum);
    fb.onload = () => { zone.innerHTML = ""; zone.appendChild(fb); };
    fb.onerror = () => { zone.innerHTML = '<div class="placeholder">無圖片</div>'; };
  };
}

async function addPart() {
  const num  = document.getElementById("inputNum").value.trim();
  const qty  = parseInt(document.getElementById("inputQty").value) || 1;
  const name = document.getElementById("inputName").value.trim();
  const colorSel  = document.getElementById("colorSelect");
  const colorId   = colorSel.value;
  const colorName = colorSel.options[colorSel.selectedIndex]?.dataset.name || "";
  const colorHex  = colorSel.options[colorSel.selectedIndex]?.dataset.hex || "#888";
  let   cat  = document.getElementById("catSelect").value || autoDetectCategory(num) || "Other";

  if (!num) { showToast("⚠️ 請輸入零件編號"); return; }
  if (qty < 1) { showToast("⚠️ 數量需至少為 1"); return; }

  const data = { num, name, colorId, colorName, colorHex, cat, qty,
                 createdAt: window._serverTimestamp ? window._serverTimestamp() : Date.now() };

  if (window._firebaseReady) {
    try {
      await window._addDoc(window._colRef, data);
      showToast("✅ 已加入雲端");
    } catch(e) {
      console.error(e);
      showToast("❌ Firebase 錯誤，請檢查設定");
      return;
    }
  } else {
    window._parts.push({ firestoreId: "local_"+Date.now(), ...data });
    renderTable();
    showToast("📦 已加入 (本地模式)");
  }

  document.getElementById("inputNum").value = "";
  document.getElementById("inputQty").value = "1";
  document.getElementById("inputName").value = "";
  document.getElementById("catSelect").value = "";
  document.getElementById("autoCategory").textContent = "";
  document.getElementById("previewZone").innerHTML = '<div class="placeholder">輸入編號<br>睇預覽</div>';
}

async function updateQty(firestoreId, delta) {
  const part = window._parts.find(p => p.firestoreId === firestoreId);
  if (!part) return;
  const newQty = Math.max(0, (part.qty || 0) + delta);
  if (window._firebaseReady && !firestoreId.startsWith("local_")) {
    await window._updateDoc(window._doc(window._db, "lego_parts", firestoreId), { qty: newQty });
  } else {
    part.qty = newQty;
    renderTable();
  }
}

async function deletePart(firestoreId) {
  if (!confirm("確定刪除呢個零件記錄？")) return;
  if (window._firebaseReady && !firestoreId.startsWith("local_")) {
    await window._deleteDoc(window._doc(window._db, "lego_parts", firestoreId));
  } else {
    window._parts = window._parts.filter(p => p.firestoreId !== firestoreId);
    renderTable();
  }
  showToast("🗑 已刪除");
}

function sortBy(field) {
  if (sortField === field) sortAsc = !sortAsc;
  else { sortField = field; sortAsc = true; }
  ["thNum","thColor","thCat","thQty"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove("sorted");
  });
  const map = {num:"thNum", color:"thColor", cat:"thCat", qty:"thQty"};
  if (map[field]) document.getElementById(map[field]).classList.add("sorted");
  renderTable();
}

function renderTable() {
  const search    = (document.getElementById("searchInput")?.value || "").toLowerCase();
  const filterCol = document.getElementById("filterColor")?.value || "";
  const filterCat = document.getElementById("filterCat")?.value || "";

  let data = (window._parts || []).filter(p => {
    const matchSearch = !search || p.num?.toLowerCase().includes(search) || p.name?.toLowerCase().includes(search);
    const matchColor  = !filterCol || p.colorId === filterCol;
    const matchCat    = !filterCat || p.cat === filterCat;
    return matchSearch && matchColor && matchCat;
  });

  data.sort((a,b) => {
    let va = a[sortField === "color" ? "colorName" : sortField] ?? "";
    let vb = b[sortField === "color" ? "colorName" : sortField] ?? "";
    if (sortField === "qty") { va = +va; vb = +vb; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  const tbody = document.getElementById("tableBody");
  const empty = document.getElementById("emptyState");
  document.getElementById("countBadge").textContent = `${data.length} 項零件`;

  if (data.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  tbody.innerHTML = data.map(p => {
    const imgUrl  = blImgUrl(p.num, p.colorId);
    const fbUrl   = blImgFallback(p.num);
    const dotStyle = `background:${p.colorHex};border-color:${p.colorHex==='#FFFFFF'?'#ccc':p.colorHex}`;
    return `
    <tr>
      <td>
        <img class="part-img img-thumb"
          src="${imgUrl}"
          onerror="this.src='${fbUrl}';this.onerror=null"
          alt="${p.num}" />
      </td>
      <td>
        <div class="part-num">${p.num}</div>
        ${p.name ? `<div class="part-name">${p.name}</div>` : ""}
      </td>
      <td><div class="part-name">${p.name || "—"}</div></td>
      <td>
        <div class="color-chip">
          <div class="dot" style="${dotStyle}"></div>
          ${p.colorName}
        </div>
      </td>
      <td><span class="cat-badge">${p.cat || "Other"}</span></td>
      <td>
        <div class="qty-control">
          <button class="qty-btn" onclick="updateQty('${p.firestoreId}', -1)">−</button>
          <span class="qty-value">${p.qty}</span>
          <button class="qty-btn" onclick="updateQty('${p.firestoreId}', 1)">＋</button>
        </div>
      </td>
      <td>
        <button class="btn-del" onclick="deletePart('${p.firestoreId}')">🗑 刪除</button>
      </td>
    </tr>`;
  }).join("");
}

function exportCSV() {
  const data = window._parts || [];
  if (data.length === 0) { showToast("⚠️ 清單係空嘅"); return; }
  const header = ["Part Number","Part Name","Color ID","Color Name","Category","Quantity"];
  const rows = data.map(p => [
    `"${p.num}"`, `"${p.name||""}"`, `"${p.colorId}"`,
    `"${p.colorName}"`, `"${p.cat||""}"`, p.qty
  ].join(","));
  const csv = [header.join(","), ...rows].join("\n");
  const blob = new Blob(["\uFEFF"+csv], { type: "text/csv;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = `lego_parts_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast("📥 CSV 已下載");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

window.addPart        = addPart;
window.updateQty      = updateQty;
window.deletePart     = deletePart;
window.sortBy         = sortBy;
window.exportCSV      = exportCSV;
window.onPartNumInput = onPartNumInput;
window.onColorChange  = onColorChange;
window.renderTable    = renderTable;

initColorSelect("colorSelect");
onColorChange();
renderTable();
</script>
</body>
</html>
